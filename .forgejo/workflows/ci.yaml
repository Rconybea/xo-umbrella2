name: CI
on:
  push:
    branches: [main]

env:
  PATH: /nix/var/nix/profiles/default/bin:$PATH

jobs:
  smoke-test:
    runs-on: host
    steps:
      - name: Setup PATH
        run:
          echo "/nix/var/nix/profiles/default/bin" >> $GITHUB_PATH

      - name: Check PATH
        run:
          echo $PATH
