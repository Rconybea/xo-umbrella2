name: CI
on:
  push:
    branches: [main]

jobs:
  smoke-test:
    runs-on: host
    steps:
      - name: Setup PATH
        run:
          echo "/nix/var/nix/profiles/default/bin" >> $GITHUB_PATH

      - name: Check PATH
        run:
          echo $PATH

      - name: Check nix version
        run:
          echo $(nix --version)

      - name: nix store ping
        run:
          nix store ping
